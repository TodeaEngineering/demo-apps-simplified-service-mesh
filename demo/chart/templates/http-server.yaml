# HTTP echo server (meshed). 3 replicas so plain HTTP/1.1 fans out across pods.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: http-server
  namespace: {{ .Release.Namespace }}
  labels:
    app: http-server
    role: server
    {{- include "demo.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.httpServer.replicas }}
  selector:
    matchLabels: { app: http-server }
  template:
    metadata:
      labels: { app: http-server, role: server }
      annotations:
        {{- include "demo.meshAnnotation" . | nindent 8 }}
    spec:
      containers:
        - name: app
          image: {{ .Values.images.httpServer }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          env:
            - { name: SERVER_NAME, value: "http-server" }
            - { name: VERSION, value: "v1" }
            - { name: PORT, value: "8080" }
          ports:
            - { name: http, containerPort: 8080 }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests: { cpu: 25m, memory: 48Mi }
            limits: { cpu: 250m, memory: 128Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: http-server
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "demo.labels" . | nindent 4 }}
spec:
  selector: { app: http-server }
  ports:
    - { name: http, port: 8080, targetPort: 8080 }
